    is_curated: true
    has_classification: true
    is_outlink_ready: true
    outlink_url: "https://www.inaturalist.org/taxa/{}"
    outlink_id_column: "taxon.col__id" # Taxonomic database: uses taxon ID

  # Plazi
  - id: 194
    parent: http://opendata.globalnames.org/sfga/
    title_short: "Plazi"
    home_url: "https://www.plazi.org"
    description: "Plazi is an association supporting and promoting the development of persistent and openly accessible digital taxonomic literature."
    is_curated: true

  # World Flora Online
  - id: 196
    parent: http://opendata.globalnames.org/sfga/
    title_short: "World Flora Online"
    home_url: "https://worldfloraonline.org"
    description: "An Online Flora of All Known Plants"
    is_curated: true
    has_classification: true
    is_outlink_ready: true
    outlink_url: "https://list.worldfloraonline.org/{}"
    outlink_id_column: "name.col__id" # Nomenclatural database: uses name ID (all record types)

  # World Checklist of Vasular Plants
  - id: 197
    parent: http://opendata.globalnames.org/sfga/
    title_short: "WCVP"
    home_url: "https://wcvp.science.kew.org"
    is_curated: true
    outlink_url: "https://powo.science.kew.org/taxon/urn:lsid:ipni.org:names:{}"
    outlink_id_column: "name.col__alternative_id"
    prefer_flat_classification: true

  # ICTV Virus Taxonomy
  - id: 201
    parent: http://opendata.globalnames.org/sfga/
    title: "ICTV Virus Taxonomy"
    title_short: "ICTV"
    home_url: "https://ictv.global/taxonomy"
    is_curated: true

  # MycoBank
  - id: 203
    parent: http://opendata.globalnames.org/sfga/
    title_short: "MycoBank"
    home_url: "https://www.mycobank.org"
    is_curated: true
    is_outlink_ready: true
    outlink_url: "https://www.mycobank.org/page/Name details page/{}"
    outlink_id_column: "name.col__id" # Nomenclatural database: uses name ID (all record types)

  # Ruhoff 1980
  - id: 206
    parent: http://opendata.globalnames.org/sfga/
