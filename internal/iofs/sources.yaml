      Myriatrix is a Scratchpads-based Virtual Research Environment proposed to the International Society of Myriapodology. It allows collaborative editing and linking of the classification, literature, and morphological traits of the many-legged terrestrial invertebrate groups Onychophora and Myriapoda (to the inclusion of Euthycarcinoidea). The taxonomic backbone is based on the Species 2000 & ITIS Catalogue of Life (2015 release). The literature database contains circa 1300 references, spanning from 1535 to present. This dataset represents the output of an ongoing endeavor, and therefore is periodically updated. For more information, please see http://myriatrix.myspecies.info/ and the original database proposal on https://www.researchgate.net/publication/337844165



      How to cite:

      The Fellegship of the Rings (2020 onwards): Myriatrix. Available from http://myriatrix.myspecies.info
    home_url: http://myriatrix.myspecies.info
    is_curated: true
    has_classification: true
    outlink_url: https://myriatrix.myspecies.info/myriatrix/{}
    outlink_id_column: name.col__alternative_id
    prefer_flat_classification: false

